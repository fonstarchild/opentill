[tool.pytest.ini_options]
testpaths = ["backend/tests"]
addopts = "-v --tb=short"
asyncio_mode = "auto"
filterwarnings = ["ignore::DeprecationWarning"]

[tool.coverage.run]
source = ["backend"]
omit = [
    "backend/tests/*",
    "backend/alembic/*",
    "backend/main_entry.py",
    # Legacy code kept for reference — superseded by DDD structure, not imported
    "backend/catalog/models.py",
    "backend/catalog/router.py",
    "backend/config/*",
    "backend/orders/*",
    "backend/payments/base.py",
    "backend/payments/providers/*",
    "backend/payments/registry.py",
    "backend/payments/router.py",
    "backend/shared/infrastructure/sqlmodel_repository.py",
    # Ecommerce connectors use optional dep (requests), tested separately
    "backend/ecommerce/infrastructure/connectors/*",
    # Online payment provider stubs — require real credentials to test
    "backend/payments/infrastructure/providers/stripe_terminal.py",
    "backend/payments/infrastructure/providers/sumup.py",
    "backend/payments/infrastructure/providers/paypal.py",
    "backend/payments/infrastructure/providers/redsys.py",
    "backend/payments/infrastructure/providers/square.py",
]

[tool.coverage.report]
fail_under = 80
show_missing = true
